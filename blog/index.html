<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog | Candidit Consulting</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; }
    h1 { text-align: center; }
    .post { margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #ddd; }
    .post-title { font-size: 1.5em; margin-bottom: 5px; }
    .post-date { color: #555; font-size: 0.9em; margin-bottom: 10px; }
    .post-content { white-space: pre-wrap; }
    a { color: #0077cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <h1>Blog</h1>
  <div id="blog-posts">Loading posts...</div>

<script>
async function loadPosts() {
  const postsContainer = document.getElementById('blog-posts');

  try {
    const response = await fetch('/content/blog/posts.json');
    const posts = await response.json();

    postsContainer.innerHTML = '';

    for (const post of posts) {
      const res = await fetch(`/content/blog/${post.filename}`);
      const text = await res.text();

      // Extract Markdown content (ignore front matter)
      const match = text.match(/---\s*([\s\S]*?)\s*---\s*([\s\S]*)/);
      const content = match ? match[2].trim() : text;

      // Create excerpt (first 200 chars, plain text)
      const excerpt = content.replace(/[\r\n]+/g, ' ').substring(0, 200) + (content.length > 200 ? '...' : '');

      // Post element
      const postDiv = document.createElement('div');
      postDiv.className = 'post';
      postDiv.innerHTML = `
        <div class="post-title">${post.title}</div>
        <div class="post-date">${post.date}</div>
        <div class="post-content">${marked.parse(content)}</div>
      `;
      postsContainer.appendChild(postDiv);
    }
  } catch (err) {
    postsContainer.innerHTML = 'Error loading posts.';
    console.error(err);
  }
}

loadPosts();
</script>
</body>
</html>
