<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musings | Candidit</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #222;
    }

    header {
      background-image: url("/images/Background-light-blue.png");
      background-size: cover;
      background-position: center;
      padding: 40px 25px;
      text-align: center;
    }

    header img {
      max-width: 500px;
      width: 100%;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }
    /* ========= NAVIGATION ========= */
    nav {
      background: white;
      padding: 18px 40px;
      display: flex;
      justify-content: flex-end;
      gap: 30px;
      border-bottom: ;
    }

    nav a {
      text-decoration: none;
      color: #0b3d91;
      font-weight: bold;
      font-size: 1.05rem;
    }
    .post {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding: 25px 0;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .post-title {
      font-size: 22px;
      font-weight: 600;
    }

    .post-meta {
      font-size: 13px;
      color: #888;
      margin-top: 5px;
    }

    .post-excerpt {
      font-size: 15px;
      color: #555;
      margin-top: 10px;
    }

    .read-more {
      display: inline-block;
      margin-top: 12px;
      font-size: 13px;
      color: #0b3d91;
      text-decoration: none;
    }

    .post-image {
      width: 140px;
      height: 100px;
      object-fit: cover;
      border-radius: 6px;
    }

    .page-title { 
      text-align: center; 
      margin-top: 10px; 
      font-size: 60px; 
      letter-spacing: 4px; 
      font-family: 'Playfair Display', serif; 
      font-weight: 600; 
      font-style: italic;
      color: #0b3d91; 
     }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a href="/">Home</a>    
    <a href="/Founder/">Founder</a>
    <a href="/Services/">Services</a>
    <a href="/Resources/">Resources</a>
    <a href="/Contact Us/">Contact</a>
  </nav>
<header>
  <img src="/images/Candidit-Logo-Dark.png" alt="Logo">
</header>
<div class="page-title">Candid Musings</div>
<div class="container" id="postContainer"></div>

<script>
let allPosts = [];

async function loadPosts() {
  const res = await fetch('/content/blog/posts.json');
  allPosts = await res.json();
  renderPosts(allPosts);
}

function renderPosts(posts) {
  const container = document.getElementById('postContainer');
  container.innerHTML = "";

  posts.forEach(post => {

    const slug = (post.filename || "")
      .replace(".md", "")
      .trim()
      .toLowerCase();

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div>
        <div class="post-title">${post.title || ""}</div>
        <div class="post-meta">${post.date || ""}</div>
        <div class="post-excerpt">${post.excerpt || ""}</div>

        <a class="read-more"
           href="/blog/post?slug=${slug}">
          Read more →
        </a>
      </div>

      <img class="post-image" src="https://via.placeholder.com/150">
    `;

    // ENTIRE CARD CLICK (safe, no .html usage)
    div.addEventListener("click", () => {
      window.location.href = `/blog/post?slug=${slug}`;
    });

    container.appendChild(div);
  });
}

loadPosts();
</script>

</body>
</html>
