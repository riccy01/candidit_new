<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog | Candidit Consulting</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; }
    h1 { text-align: center; }
    .post { margin-bottom: 30px; }
    .post-title { font-size: 1.5em; margin-bottom: 5px; }
    .post-date { color: #555; font-size: 0.9em; margin-bottom: 10px; }
    .post-content { white-space: pre-wrap; }
    a { color: #0077cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Blog</h1>
  <div id="blog-posts">Loading posts...</div>

  <script>
    async function loadPosts() {
      const postsContainer = document.getElementById('blog-posts');

      try {
        // List all Markdown files in content/blog/
        const files = [
          "test-run.md" // Add more posts here manually if needed
        ];

        postsContainer.innerHTML = '';

        for (const file of files) {
          const response = await fetch(`/content/blog/${file}`);
          const text = await response.text();

          // Split front matter and content
          const match = text.match(/---\s*([\s\S]*?)\s*---\s*([\s\S]*)/);
          let metadata = {}, content = '';
          if (match) {
            match[1].split('\n').forEach(line => {
              const [key, ...rest] = line.split(':');
              if(key) metadata[key.trim()] = rest.join(':').trim();
            });
            content = match[2].trim();
          }

          // Create post element
          const postDiv = document.createElement('div');
          postDiv.className = 'post';
          postDiv.innerHTML = `
            <div class="post-title">${metadata.title || 'Untitled'}</div>
            <div class="post-date">${metadata.date || ''}</div>
            <div class="post-content">${content}</div>
          `;
          postsContainer.appendChild(postDiv);
        }
      } catch (err) {
        postsContainer.innerHTML = 'Error loading posts.';
        console.error(err);
      }
    }

    loadPosts();
  </script>
</body>
</html>
