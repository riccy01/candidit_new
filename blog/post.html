<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog Post</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; }
    h1 { text-align: center; margin-bottom: 5px; }
    .post-date { color: #555; font-size: 0.9em; margin-bottom: 20px; text-align: center; }
    .post-content { white-space: pre-wrap; }
    a.back { display: block; margin-bottom: 20px; color: #0077cc; text-decoration: none; }
    a.back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <a href="/blog/" class="back">&larr; Back to blog</a>
  <h1 id="post-title">Loading...</h1>
  <div id="post-date" class="post-date"></div>
  <div id="post-content" class="post-content"></div>

  <script>
    // Read query parameters
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    const title = params.get('title');
    const date = params.get('date');

    document.getElementById('post-title').textContent = title;
    document.getElementById('post-date').textContent = date;

    // Fetch and render Markdown
    fetch(`/content/blog/${file}`)
      .then(res => res.text())
      .then(text => {
        const match = text.match(/---\s*([\s\S]*?)\s*---\s*([\s\S]*)/);
        const content = match ? match[2].trim() : text;
        document.getElementById('post-content').innerHTML = marked.parse(content);
      })
      .catch(err => {
        document.getElementById('post-content').textContent = 'Error loading post.';
        console.error(err);
      });
  </script>
</body>
</html>
