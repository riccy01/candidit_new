<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #222;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 40px 20px;
    }

    .back a {
      text-decoration: none;
      color: #555;
      font-size: 14px;
    }

    h1 {
      font-size: 36px;
      margin: 20px 0 10px;
    }

    .meta {
      font-size: 13px;
      color: #888;
      margin-bottom: 30px;
    }

    .content {
      font-size: 18px;
      line-height: 1.6;
    }

    .content h1 {
      font-size: 28px;
      margin-top: 20px;
    }

    .content h2 {
      font-size: 22px;
      margin-top: 18px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="back">
      <a href="/blog/">← Back to blog</a>
    </div>

    <h1 id="title">Loading...</h1>
    <div class="meta" id="meta"></div>

    <div class="content" id="content">Loading post...</div>

  </div>

  <script>
    async function loadPost() {

      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");

      console.log("URL:", window.location.href);
      console.log("SLUG:", slug);

      if (!slug) {
        document.getElementById("title").innerText = "Post not found";
        document.getElementById("content").innerText = "Missing slug in URL.";
        return;
      }

      try {
        const res = await fetch("/content/blog/posts.json");
        const posts = await res.json();

        const post = posts.find(p => {
          const fileSlug = (p.filename || "")
            .replace(".md", "")
            .trim()
            .toLowerCase();

          return fileSlug === slug.trim().toLowerCase();
        });

        if (!post) {
          document.getElementById("title").innerText = "Post not found";
          document.getElementById("content").innerText = "No matching post found.";
          return;
        }

        document.getElementById("title").innerText = post.title || "Untitled";
        document.getElementById("meta").innerText = post.date || "";

        const mdRes = await fetch(`/content/blog/${post.filename}`);
        const mdText = await mdRes.text();

        // ✅ STRIP FRONTMATTER (IMPORTANT FIX)
        const cleaned = mdText.replace(/---[\s\S]*?---/, "").trim();

        // SIMPLE MARKDOWN RENDERING
        const html = cleaned
          .replace(/^# (.*$)/gm, "<h1>$1</h1>")
          .replace(/^## (.*$)/gm, "<h2>$1</h2>")
          .replace(/\n\n/g, "<br><br>");

        document.getElementById("content").innerHTML = html;

      } catch (err) {
        console.error(err);
        document.getElementById("title").innerText = "Error loading post";
        document.getElementById("content").innerText = err.message;
      }
    }

    loadPost();
  </script>

</body>
</html>
